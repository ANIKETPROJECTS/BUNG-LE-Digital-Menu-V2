<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 200" width="540" height="200">
  <defs>
    <!-- Stone/travertine marble gradient -->
    <linearGradient id="marbleBase" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#F7EDD5"/>
      <stop offset="18%"  stop-color="#EEE0BE"/>
      <stop offset="40%"  stop-color="#F5E8CC"/>
      <stop offset="62%"  stop-color="#E6D5AD"/>
      <stop offset="82%"  stop-color="#F0E2C4"/>
      <stop offset="100%" stop-color="#E8D9B0"/>
    </linearGradient>

    <!-- Gold crown molding top gradient -->
    <linearGradient id="goldTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#EDD060"/>
      <stop offset="25%"  stop-color="#C88A20"/>
      <stop offset="55%"  stop-color="#B07818"/>
      <stop offset="80%"  stop-color="#D4A838"/>
      <stop offset="100%" stop-color="#8C6010"/>
    </linearGradient>

    <!-- Gold top shelf highlight -->
    <linearGradient id="shelfTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5DC70"/>
      <stop offset="40%"  stop-color="#D4A838"/>
      <stop offset="100%" stop-color="#A07820"/>
    </linearGradient>

    <!-- Gold side frame -->
    <linearGradient id="goldSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8C6010"/>
      <stop offset="35%"  stop-color="#D4A838"/>
      <stop offset="65%"  stop-color="#D4A838"/>
      <stop offset="100%" stop-color="#8C6010"/>
    </linearGradient>

    <!-- Gold bottom frame -->
    <linearGradient id="goldBot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#A07820"/>
      <stop offset="40%"  stop-color="#D8AC3C"/>
      <stop offset="100%" stop-color="#7A5010"/>
    </linearGradient>

    <!-- Text: rich amber-brown gradient -->
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#8B5500"/>
      <stop offset="28%"  stop-color="#6B3C00"/>
      <stop offset="58%"  stop-color="#4A2600"/>
      <stop offset="100%" stop-color="#3A1C00"/>
    </linearGradient>

    <!-- Soft backlit warm glow behind text -->
    <radialGradient id="backGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFDE0" stop-opacity="0.70"/>
      <stop offset="45%"  stop-color="#F8E8A0" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#E8D080" stop-opacity="0.00"/>
    </radialGradient>

    <!-- Stone surface vignette -->
    <radialGradient id="stoneVig" cx="50%" cy="48%" r="56%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7A5800" stop-opacity="0.12"/>
    </radialGradient>

    <!-- Subtle text glow -->
    <filter id="glow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Drop shadow for text depth -->
    <filter id="shadow" x="-5%" y="-10%" width="115%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="2.5" flood-color="#3A1A00" flood-opacity="0.55"/>
    </filter>

    <!-- Clip to stone area -->
    <clipPath id="stoneClip">
      <rect x="9" y="34" width="522" height="152" rx="1"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════ FRAME SHADOW ═══════════════════ -->
  <rect x="5" y="32" width="530" height="160" rx="3" fill="#1A0A00" opacity="0.35"/>

  <!-- ═══════════════════ STONE PANEL ═══════════════════ -->
  <rect x="9" y="34" width="522" height="152" fill="url(#marbleBase)"/>

  <!-- Marble veining (diagonal streaks) -->
  <g clip-path="url(#stoneClip)" opacity="0.14" stroke-linecap="round">
    <line x1="0"   y1="60"  x2="540" y2="150" stroke="#C0A060" stroke-width="1.6"/>
    <line x1="40"  y1="34"  x2="200" y2="186" stroke="#B89848" stroke-width="1.0"/>
    <line x1="180" y1="34"  x2="390" y2="186" stroke="#C4AA68" stroke-width="1.3"/>
    <line x1="320" y1="34"  x2="540" y2="148" stroke="#B89050" stroke-width="0.9"/>
    <line x1="0"   y1="118" x2="160" y2="186" stroke="#C0A060" stroke-width="0.7"/>
    <line x1="400" y1="34"  x2="540" y2="106" stroke="#BC9858" stroke-width="1.1"/>
    <line x1="70"  y1="34"  x2="0"   y2="82"  stroke="#C4A870" stroke-width="0.8"/>
    <line x1="260" y1="45"  x2="420" y2="186" stroke="#B89050" stroke-width="0.6"/>
    <line x1="460" y1="60"  x2="540" y2="86"  stroke="#C0A060" stroke-width="0.5"/>
  </g>

  <!-- Surface sheen -->
  <rect x="9" y="34" width="522" height="152" fill="url(#stoneVig)"/>

  <!-- ═══════════════════ BACKLIT GLOW ═══════════════════ -->
  <ellipse cx="270" cy="110" rx="205" ry="62" fill="url(#backGlow)"/>

  <!-- ═══════════════════ CROWN MOLDING ═══════════════════ -->
  <!-- Top overhang / shelf plate -->
  <rect x="0"  y="4"  width="540" height="10" fill="url(#shelfTop)" rx="1"/>
  <rect x="0"  y="14" width="540" height="3"  fill="#EDD060" opacity="0.5"/>

  <!-- Main cornice bar -->
  <rect x="0" y="17" width="540" height="20" fill="url(#goldTop)"/>

  <!-- Dentil pattern -->
  <g fill="#7A5000" opacity="0.8">
    <rect x="8"  y="18" width="10" height="11" rx="0.5"/>
    <rect x="22" y="18" width="10" height="11" rx="0.5"/>
    <rect x="36" y="18" width="10" height="11" rx="0.5"/>
    <rect x="50" y="18" width="10" height="11" rx="0.5"/>
    <rect x="64" y="18" width="10" height="11" rx="0.5"/>
    <rect x="78" y="18" width="10" height="11" rx="0.5"/>
    <rect x="92" y="18" width="10" height="11" rx="0.5"/>
    <rect x="106" y="18" width="10" height="11" rx="0.5"/>
    <rect x="120" y="18" width="10" height="11" rx="0.5"/>
    <rect x="134" y="18" width="10" height="11" rx="0.5"/>
    <rect x="148" y="18" width="10" height="11" rx="0.5"/>
    <rect x="162" y="18" width="10" height="11" rx="0.5"/>
    <rect x="176" y="18" width="10" height="11" rx="0.5"/>
    <rect x="190" y="18" width="10" height="11" rx="0.5"/>
    <rect x="204" y="18" width="10" height="11" rx="0.5"/>
    <rect x="218" y="18" width="10" height="11" rx="0.5"/>
    <rect x="232" y="18" width="10" height="11" rx="0.5"/>
    <rect x="246" y="18" width="10" height="11" rx="0.5"/>
    <rect x="260" y="18" width="10" height="11" rx="0.5"/>
    <rect x="274" y="18" width="10" height="11" rx="0.5"/>
    <rect x="288" y="18" width="10" height="11" rx="0.5"/>
    <rect x="302" y="18" width="10" height="11" rx="0.5"/>
    <rect x="316" y="18" width="10" height="11" rx="0.5"/>
    <rect x="330" y="18" width="10" height="11" rx="0.5"/>
    <rect x="344" y="18" width="10" height="11" rx="0.5"/>
    <rect x="358" y="18" width="10" height="11" rx="0.5"/>
    <rect x="372" y="18" width="10" height="11" rx="0.5"/>
    <rect x="386" y="18" width="10" height="11" rx="0.5"/>
    <rect x="400" y="18" width="10" height="11" rx="0.5"/>
    <rect x="414" y="18" width="10" height="11" rx="0.5"/>
    <rect x="428" y="18" width="10" height="11" rx="0.5"/>
    <rect x="442" y="18" width="10" height="11" rx="0.5"/>
    <rect x="456" y="18" width="10" height="11" rx="0.5"/>
    <rect x="470" y="18" width="10" height="11" rx="0.5"/>
    <rect x="484" y="18" width="10" height="11" rx="0.5"/>
    <rect x="498" y="18" width="10" height="11" rx="0.5"/>
    <rect x="512" y="18" width="10" height="11" rx="0.5"/>
    <rect x="526" y="18" width="10" height="11" rx="0.5"/>
  </g>

  <!-- Dentil highlight (top bright edge) -->
  <g fill="#F5DC70" opacity="0.35">
    <rect x="8"  y="18" width="10" height="2"/>
    <rect x="22" y="18" width="10" height="2"/>
    <rect x="36" y="18" width="10" height="2"/>
    <rect x="50" y="18" width="10" height="2"/>
    <rect x="64" y="18" width="10" height="2"/>
    <rect x="78" y="18" width="10" height="2"/>
    <rect x="92" y="18" width="10" height="2"/>
    <rect x="106" y="18" width="10" height="2"/>
    <rect x="120" y="18" width="10" height="2"/>
    <rect x="134" y="18" width="10" height="2"/>
    <rect x="148" y="18" width="10" height="2"/>
    <rect x="162" y="18" width="10" height="2"/>
    <rect x="176" y="18" width="10" height="2"/>
    <rect x="190" y="18" width="10" height="2"/>
    <rect x="204" y="18" width="10" height="2"/>
    <rect x="218" y="18" width="10" height="2"/>
    <rect x="232" y="18" width="10" height="2"/>
    <rect x="246" y="18" width="10" height="2"/>
    <rect x="260" y="18" width="10" height="2"/>
    <rect x="274" y="18" width="10" height="2"/>
    <rect x="288" y="18" width="10" height="2"/>
    <rect x="302" y="18" width="10" height="2"/>
    <rect x="316" y="18" width="10" height="2"/>
    <rect x="330" y="18" width="10" height="2"/>
    <rect x="344" y="18" width="10" height="2"/>
    <rect x="358" y="18" width="10" height="2"/>
    <rect x="372" y="18" width="10" height="2"/>
    <rect x="386" y="18" width="10" height="2"/>
    <rect x="400" y="18" width="10" height="2"/>
    <rect x="414" y="18" width="10" height="2"/>
    <rect x="428" y="18" width="10" height="2"/>
    <rect x="442" y="18" width="10" height="2"/>
    <rect x="456" y="18" width="10" height="2"/>
    <rect x="470" y="18" width="10" height="2"/>
    <rect x="484" y="18" width="10" height="2"/>
    <rect x="498" y="18" width="10" height="2"/>
    <rect x="512" y="18" width="10" height="2"/>
    <rect x="526" y="18" width="10" height="2"/>
  </g>

  <!-- Lower cornice ledge -->
  <rect x="0" y="29" width="540" height="6" fill="url(#goldBot)"/>
  <!-- Ledge highlight line -->
  <rect x="0" y="29" width="540" height="1" fill="#F0D060" opacity="0.5"/>

  <!-- ═══════════════════ SIDE FRAMES ═══════════════════ -->
  <rect x="0"   y="35" width="9" height="151" fill="url(#goldSide)"/>
  <rect x="531" y="35" width="9" height="151" fill="url(#goldSide)"/>

  <!-- ═══════════════════ BOTTOM FRAME ═══════════════════ -->
  <rect x="0" y="184" width="540" height="13" fill="url(#goldBot)"/>
  <rect x="0" y="184" width="540" height="2"  fill="#F0D060" opacity="0.4"/>
  <!-- Bottom shadow -->
  <rect x="6" y="196" width="528" height="4" rx="2" fill="#1A0A00" opacity="0.25"/>

  <!-- ═══════════════════ CORNER RIVETS ═══════════════════ -->
  <circle cx="9"   cy="35"  r="4.5" fill="#D4A838" stroke="#F5DC70" stroke-width="0.8"/>
  <circle cx="531" cy="35"  r="4.5" fill="#D4A838" stroke="#F5DC70" stroke-width="0.8"/>
  <circle cx="9"   cy="185" r="4.5" fill="#D4A838" stroke="#F5DC70" stroke-width="0.8"/>
  <circle cx="531" cy="185" r="4.5" fill="#D4A838" stroke="#F5DC70" stroke-width="0.8"/>

  <!-- ═══════════════════ DECORATIVE SWIRLS ═══════════════════ -->
  <!-- Left flourish -->
  <g fill="none" stroke="#7A5210" stroke-linecap="round" stroke-linejoin="round" opacity="0.65">
    <path d="M 42 110 C 42 96, 58 89, 66 100 C 74 111, 67 126, 57 122 C 47 118, 47 107, 55 104 C 63 101, 70 107, 67 114" stroke-width="1.6"/>
    <path d="M 30 110 C 30 93, 48 85, 58 97" stroke-width="1.3"/>
    <path d="M 30 110 C 30 124, 44 130, 52 122" stroke-width="1.0"/>
  </g>

  <!-- Right flourish (mirror) -->
  <g fill="none" stroke="#7A5210" stroke-linecap="round" stroke-linejoin="round" opacity="0.65">
    <path d="M 498 110 C 498 96, 482 89, 474 100 C 466 111, 473 126, 483 122 C 493 118, 493 107, 485 104 C 477 101, 470 107, 473 114" stroke-width="1.6"/>
    <path d="M 510 110 C 510 93, 492 85, 482 97" stroke-width="1.3"/>
    <path d="M 510 110 C 510 124, 496 130, 488 122" stroke-width="1.0"/>
  </g>

  <!-- ═══════════════════ MAIN TEXT ═══════════════════ -->
  <!-- Deep shadow layer (offset, behind) -->
  <text
    x="274" y="138"
    text-anchor="middle"
    font-family="Palatino Linotype, Palatino, Book Antiqua, Garamond, Georgia, serif"
    font-size="90"
    font-style="italic"
    font-weight="bold"
    fill="#3A1A00"
    opacity="0.40"
    letter-spacing="-1"
  >Bung-le</text>

  <!-- Primary text with glow -->
  <text
    x="272" y="135"
    text-anchor="middle"
    font-family="Palatino Linotype, Palatino, Book Antiqua, Garamond, Georgia, serif"
    font-size="90"
    font-style="italic"
    font-weight="bold"
    fill="url(#goldText)"
    filter="url(#glow)"
    letter-spacing="-1"
  >Bung-le</text>

  <!-- Top highlight stroke (gives engraved golden look) -->
  <text
    x="272" y="135"
    text-anchor="middle"
    font-family="Palatino Linotype, Palatino, Book Antiqua, Garamond, Georgia, serif"
    font-size="90"
    font-style="italic"
    font-weight="bold"
    fill="none"
    stroke="#F0D060"
    stroke-width="0.5"
    opacity="0.45"
    letter-spacing="-1"
  >Bung-le</text>

  <!-- ═══════════════════ DIAMOND STAR ═══════════════════ -->
  <polygon points="531,194 533,197.5 531,201 529,197.5" fill="#F0D060" opacity="0.80"/>
</svg>
